services:
  - type: web
    name: naac-ssr-verifier
    runtime: node
    region: singapore
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AZURE_AI_MODEL
        value: claude-sonnet-4-5
      - key: AZURE_AI_ENDPOINT
        sync: false
      - key: AZURE_AI_KEY
        sync: false
